<!DOCTYPE html>
<html lang="de-CH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innenvisualisierung als animiertes A4-PDF</title>
    <meta
      name="description"
      content="Ein scrollgesteuertes, animiertes A4-Dokument im Apple-inspirierten Premium-Stil für Interior Visualisierung."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="document-scroll" id="documentScroll">
      <div class="a4-stage-wrapper">
        <section class="a4-page" id="a4Page" aria-label="Animiertes A4-Dokument">
          <div class="ambient-light" aria-hidden="true"></div>

          <div class="image-layer-stack" aria-hidden="true">
            <figure class="image-frame layer-hero" data-layer="hero">
              <img data-image-key="heroImage" alt="Hero-Bild" />
            </figure>
            <figure class="image-frame layer-source" data-layer="source">
              <img data-image-key="sourceImage" alt="Ausgangsbild" />
            </figure>
            <figure class="image-frame layer-abstract" data-layer="abstract">
              <img data-image-key="abstractImage" alt="Abstrakte Konzeptvisualisierung" />
            </figure>
            <figure class="image-frame layer-render" data-layer="render">
              <img data-image-key="realisticRender" alt="Finale Visualisierung" />
            </figure>
          </div>

          <div class="scene-content">
            <p class="eyebrow" id="sceneEyebrow"></p>
            <h1 id="sceneHeadline"></h1>
            <p class="scene-description" id="sceneDescription"></p>

            <div class="micro-ui" id="sceneMicroUi" aria-hidden="true">
              <span>Upload</span>
              <span>Plattform</span>
              <span>E-Mail-Login</span>
            </div>

            <div class="scene-list" id="sceneList" aria-hidden="true">
              <span>Hochladen</span>
              <span>Visualisieren</span>
              <span>Prüfen</span>
              <span>Erst dann bezahlen</span>
            </div>

            <div class="cta-row" id="sceneCtas">
              <a href="#" class="pill-btn primary" id="ctaPrimary">Projekt starten</a>
              <a href="#" class="pill-btn" id="ctaSecondary">Onboarding anfragen</a>
            </div>
          </div>

          <div class="workflow-pills" role="list" aria-label="Workflow">
            <span role="listitem" class="workflow-pill" data-step="0">Upload</span>
            <span role="listitem" class="workflow-pill" data-step="1">Konzept</span>
            <span role="listitem" class="workflow-pill" data-step="2">Rendering</span>
            <span role="listitem" class="workflow-pill" data-step="3">Prüfung</span>
          </div>
        </section>
      </div>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
